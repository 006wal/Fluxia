<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fluxia — Connexion</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-brand">
            <div class="brand-icon">🌸</div>
            <h1 class="brand-name">Fluxia</h1>
            <p class="brand-tagline">Comprends ton corps, cycle après cycle</p>
        </div>

        <div class="auth-card">
            <h2>Connexion</h2>

            <div th:if="${error}" class="alert alert-error">
                <span th:text="${error}"></span>
            </div>

            <form method="post" th:action="@{/login}">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" placeholder="ton@email.com" required>
                </div>
                <div class="form-group">
                    <label>Mot de passe</label>
                    <input type="password" name="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary btn-full">Se connecter</button>
            </form>

            <p class="auth-switch">
                Pas encore de compte ?
                <a th:href="@{/register}">Créer un compte</a>
            </p>
        </div>
    </div>
</body>
</html>
